name: Build Android APK

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.4'
          channel: 'stable'
          cache: true

      - name: Set up Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Get Flutter dependencies
        run: flutter pub get

      - name: Generate code
        run: flutter pub run build_runner build --delete-conflicting-outputs || true

      - name: Build Android APK (Optimized)
        run: |
          flutter build apk --release \
            --split-per-abi \
            --obfuscate \
            --split-debug-info=./debug_symbols

      - name: Upload APK (arm64)
        uses: actions/upload-artifact@v4
        with:
          name: flutter-app-arm64-${{ github.sha }}
          path: build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
          retention-days: 30

      - name: Upload APK (arm)
        uses: actions/upload-artifact@v4
        with:
          name: flutter-app-arm-${{ github.sha }}
          path: build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
          retention-days: 30

      - name: Upload APK (x64)
        uses: actions/upload-artifact@v4
        with:
          name: flutter-app-x64-${{ github.sha }}
          path: build/app/outputs/flutter-apk/app-x86_64-release.apk
          retention-days: 30

      - name: Upload debug symbols
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-symbols-${{ github.sha }}
          path: debug_symbols
          retention-days: 90
