name: Build Android APK

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.4'
          channel: 'stable'
          cache: true

      - name: Set up Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Get Flutter dependencies
        run: flutter pub get

      - name: Generate code
        run: flutter pub run build_runner build --delete-conflicting-outputs || true

      - name: Setup release keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          mkdir -p android/app
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > android/app/release.keystore
            # 验证 keystore
            keytool -list -keystore android/app/release.keystore -storepass android
          else
            echo "请在GitHub Secrets中添加KEYSTORE_BASE64"
            exit 1
          fi

      - name: Build Android APK (arm64 only)
        run: |
          flutter build apk --release \
            --target-platform android-arm64 \
            --obfuscate \
            --split-debug-info=./debug_symbols

      - name: List output files
        run: find build/app/outputs/flutter-apk -name "*.apk"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: flutter-app-arm64-${{ github.sha }}
          path: build/app/outputs/flutter-apk/app-*.apk
          retention-days: 30

      - name: Upload debug symbols
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-symbols-${{ github.sha }}
          path: debug_symbols
          retention-days: 90

      - name: Upload APK to file server
        run: |
          APK_FILE=$(find build/app/outputs/flutter-apk -name "*.apk" | head -1)
          if [ -n "$APK_FILE" ]; then
            echo "Uploading $APK_FILE to file server..."
            RESPONSE=$(curl -s -X POST "http://139.9.42.203:8988/api/v1/upload/fr_latest_apk" \
              -F "file=@$APK_FILE" \
              -F "ttl=30d")
            echo "Upload response: $RESPONSE"
            if echo "$RESPONSE" | grep -q '"code":0'; then
              echo "APK uploaded successfully"
              echo "download_url=http://139.9.42.203:8988/api/v1/file/fr_latest_apk" >> $GITHUB_ENV
            else
              echo "APK upload failed, but continuing..."
            fi
          else
            echo "No APK found to upload"
          fi
